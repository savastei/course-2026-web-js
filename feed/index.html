<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лента постов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fdf2f7;
      --surface: #ffffff;
      --text: #2d1b25;
      --muted: #9d7b8c;
      --border: #f0d5e3;
      --accent: #db2777;
      --accent-soft: rgba(219, 39, 119, 0.1);
      --accent-softer: rgba(219, 39, 119, 0.06);
      --shadow: 0 1px 2px rgba(180, 120, 140, 0.06), 0 4px 16px rgba(180, 120, 140, 0.05);
      --shadow-hover: 0 2px 4px rgba(180, 120, 140, 0.08), 0 8px 24px rgba(180, 120, 140, 0.08);
      --radius: 14px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Manrope", system-ui, -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    .header {
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0 0 0.3rem;
      color: var(--text);
    }

    .header p {
      margin: 0;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .search-wrap {
      margin-bottom: 1.5rem;
    }

    .search-wrap label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    #search {
      width: 100%;
      padding: 0.75rem 1.1rem;
      font: inherit;
      font-size: 0.95rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    #search::placeholder {
      color: #c9a8b5;
    }

    #search:hover {
      border-color: #e2c4d5;
    }

    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    #posts {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    #posts li {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.15rem 1.3rem;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    #posts li:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
      background: linear-gradient(135deg, #ffffff 0%, #fff5f9 100%);
    }

    #posts h2 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 0.55rem;
      line-height: 1.4;
      color: var(--text);
    }

    #posts p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.65;
    }

    #loading {
      margin-top: 1.25rem;
      padding: 0.75rem 0;
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
      opacity: 0.8;
    }

    #observer-target {
      height: 1px;
      width: 100%;
      margin: 0;
      padding: 0;
      border: 0;
      overflow: hidden;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="header">
      <h1>Лента постов</h1>
      <p>Прокрутите вниз — подгрузятся новые записи</p>
    </header>

    <div class="search-wrap">
      <label for="search">Поиск</label>
      <input type="search" id="search" name="search" placeholder="Введите запрос…" autocomplete="off">
    </div>

    <ul id="posts" role="list"></ul>

    <div id="loading" aria-live="polite">Загрузка...</div>

    <div id="observer-target" aria-hidden="true"></div>
  </div>

  <script type="module" src="main.js"></script>
</body>

</html>
