<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", sans-serif;
            background: #0f0f13;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 28px;
        }

        #nav {
            position: fixed;
            top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            padding: 0 16px;
        }

        .deck-tab {
            background: #1c1c24;
            border: 2px solid #2e2e3a;
            border-radius: 20px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: .85rem;
            color: #aaa;
            transition: border-color .2s, color .2s;
        }

        .deck-tab.active {
            border-color: #7c6af7;
            color: #fff;
        }

        #card-scene {
            width: 360px;
            height: 220px;
            perspective: 900px;
        }

        #card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform .45s ease;
            cursor: pointer;
        }

        #card-inner.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            background: linear-gradient(145deg, #1c1c28, #23232f);
            border: 2px solid #2e2e3a;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
            font-size: 1.35rem;
            box-shadow: 0 12px 40px rgba(0, 0, 0, .5);
        }

        .card-face .label {
            position: absolute;
            top: 12px;
            font-size: .65rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: #555;
        }

        #card-back {
            transform: rotateY(180deg);
        }

        #hint {
            font-size: .75rem;
            color: #444;
            letter-spacing: .05em;
        }


        #progress {
            font-size: .82rem;
            color: #666;
        }


        #navi {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-btn {
            background: #1c1c24;
            border: 2px solid #2e2e3a;
            color: #ccc;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            transition: border-color .2s, color .2s;
        }

        .nav-btn:hover {
            border-color: #7c6af7;
            color: #fff;
        }

        .learned-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .88rem;
            color: #aaa;
            cursor: pointer;
        }

        .learned-label input {
            accent-color: #7c6af7;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }


        #GoBack {
            position: fixed;
            bottom: 28px;
            background: #ef5350;
            color: #fff;
            border: none;
            padding: 11px 30px;
            border-radius: 10px;
            font-size: .92rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .2s;
        }

        #GoBack:hover {
            opacity: .85;
        }
    </style>
</head>

<body>

    <div id="nav"></div>

    <div id="card-scene">
        <div id="card-inner">
            <div class="card-face" id="card-front">
                <span class="label">Front</span>
                <span id="front-text"></span>
            </div>
            <div class="card-face" id="card-back">
                <span class="label">Back</span>
                <span id="back-text"></span>
            </div>
        </div>
    </div>

    <div id="hint">Click card to flip</div>
    <div id="progress"></div>
    <div id="navi"></div>

    <button id="GoBack">← Back</button>

    <script src="remember.js"></script>
</body>

</html>
